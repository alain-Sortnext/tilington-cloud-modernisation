  # JOB 1: BUILD AND TEST
  # ============================================================
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build             -t $IMAGE_NAME:$GITHUB_SHA             -f customer-service/Dockerfile .
          # BUG: Wrong build context — should be microservices/customer-service/
          # Fix this so the Dockerfile can find its source files
      
      # BUG: No security scanning step here
