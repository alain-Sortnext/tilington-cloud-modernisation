      # TODO: Candidate adds Trivy filesystem scan
      # TODO: Candidate adds SAST scan (optional: Bandit for Python)
  
  # ============================================================
  # JOB 3: PUSH TO ECR
  # ============================================================
  push-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == "refs/heads/main" || github.ref == "refs/heads/develop"
    
    steps:
      - name: Configure AWS credentials
        # BUG: Using deprecated method — should use OIDC, not access keys
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # TODO: Candidate replaces with OIDC authentication:
