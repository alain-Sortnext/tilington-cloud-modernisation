  deploy-nonprod:
    name: Deploy to Non-Production
    runs-on: ubuntu-latest
    needs: push-ecr
    environment: non-production  # TODO: Define this environment in GitHub settings
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.NONPROD_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          # BUG: Wrong cluster name format
          aws eks update-kubeconfig --name $EKS_CLUSTER-nonprod --region $AWS_REGION
          # TODO: Should reference the non-production cluster, not production
      
      - name: Deploy to EKS
        run: |
          # BUG: Image tag undefined again
          kubectl set image deployment/customer-service             customer-service=$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG             -n tilington-nonprod
          kubectl rollout status deployment/customer-service -n tilington-nonprod --timeout=300s
  
  # ============================================================
  # JOB 5: DEPLOY TO PRODUCTION
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-nonprod
    environment: production  # TODO: Configure with required reviewers in GitHub settings
