name: Customer Service Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "microservices/customer-service/**"
      - "kubernetes/customer-service/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: # BUG: Missing ECR registry URI
  IMAGE_NAME: tilington/customer-service
  EKS_CLUSTER: tilington-production-eks

jobs:
