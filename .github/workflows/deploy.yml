  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build  # BUG: This job is defined but never runs — why?
    # TODO: Candidate identifies the bug preventing this job from running
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Checkov IaC scan
